format = """
$directory$git_branch$git_status$php$nodejs$dart$java
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 4
truncate_to_repo = true

[git_branch]
symbol = " "
format = "on [$symbol$branch]($style) "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
ahead = "⇡${count}"
behind = "⇣${count}"
staged = "✚${count}"
modified = "●${count}"
untracked = "…${count}"

[php]
format = "[$symbol$version]($style) "
symbol = " "

[nodejs]
format = "[$symbol$version]($style) "

[dart]
format = "[$symbol$version]($style) "

[java]
format = "[$symbol$version]($style) "

[cmd_duration]
min_time = 2000
format = "took [$duration](bold yellow) "
